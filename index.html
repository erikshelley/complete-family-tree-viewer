<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader" content="no-darken">
    <meta name="darkreader-lock">
    <title>Complete Family Tree Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>Complete Family Tree Viewer</h1>
    <div class="container">
        <div class="left-column">
            <div class="section-header">
                <h2>Tree Content</h2>
            </div>

            <div class="input-section">
                <h3>Gedcom File</h3>
                <input type="file" id="file-input" accept=".ged,.gedcom">
                <br>
                <span id="file-name"></span>

                <h3>Root Person</h3>
                <input type="text" id="individual-filter" placeholder="Type to filter names...">
                <select id="individual-select" size="5">
                    <option>Populated from Gedcom file...</option>
                </select>

                <h3>Tree Size</h3>
                <p>
                    <input type="number" id="generations-up" min="0" max="20" value="1">
                    <label for="generations-up">Generations Up</label>
                </p>
                <p>
                    <input type="number" id="generations-down" min="0" max="20" value="1">
                    <label for="generations-down">Generations Down</label>
                </p>
            </div>

            <div class="section-header">
                <h2>Tree Styling</h2>
            </div>

            <div class="input-section">
                <p>
                    <input type="range" id="hue-slider" min="1" max="359" value="0">
                    <label for="hue-slider">Hue (Root)</label>
                </p>

                <p>
                    <input type="range" id="saturation-slider" min="1" max="100" value="33">
                    <label for="saturation-slider">Saturation</label>
                </p>

                <p>
                    <input type="range" id="brightness-slider" min="1" max="100" value="40">
                    <label for="brightness-slider">Brightness</label>
                </p>

                <p>
                    <input type="range" id="text-brightness-slider" min="1" max="100" value="90">
                    <label for="text-brightness-slider">Text Brightness</label>
                </p>

                <p>
                    <input type="checkbox" id="transparent-bg-rect" checked>
                    <label for="transparent-bg-rect">Transparent Background</label>
                </p>

                <p>
                    <input type="color" id="color-picker" value="#000000">
                    <label for="color-picker">Background Color</label>
                </p>
            </div>
        </div>
        <div class="right-column">
            <div class="section-header">
                <h2>Family Tree</h2>
            </div>

            <div id="family-tree-div">
                <p>Open a GEDCOM file to get started.</p>
                <p>It will be processed in your browser and will not be uploaded to the server.</p>
            </div>
        </div>
    </div>
    <script src="gedcom.js"></script>
    <script src="build_tree.js"></script>
    <script src="position_tree.js"></script>
    <script src="draw_tree.js"></script>
    <script src="ui.js"></script>
</body>
</html>
