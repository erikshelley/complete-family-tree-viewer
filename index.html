<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader" content="no-darken">
    <meta name="darkreader-lock">
    <title>Complete Family Tree Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_ranges.css">
    <link rel="stylesheet" href="style_buttons.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>Complete Family Tree Viewer</h1>
    <div class="container">
        <div class="left-column">
            <div class="section-header">
                <input type="file" id="file-input" accept=".ged,.gedcom">
                <h2>Tree Content</h2>
            </div>

            <div class="input-section">
                <span id="file-name"></span>

                <h3>Root Person</h3>
                <div class="filter-container">
                    <input type="text" id="individual-filter" class="filter-input" placeholder="Type to filter names...">
                    <button id="clear-individual-filter" type="button" class="clear-filter-btn">&#10005;</button>
                </div>
                <select id="individual-select" size="5">
                    <option>Populated from Gedcom file...</option>
                </select>

                <h3>Tree Size</h3>
                <p>
                    <input type="number" id="generations-up" min="0" max="99" value="1">
                    <label for="generations-up">Generations Up</label>
                </p>
                <p>
                    <input type="number" id="generations-down" min="0" max="99" value="1">
                    <label for="generations-down">Generations Down</label>
                </p>
                <p>
                    <input type="number" id="max-stack-size" min="1" max="99" value="1">
                    <label for="max-stack-size">Maximum Stack Size</label>
                </p>
                <p>
                    <input type="checkbox" id="hide-childless-inlaws">
                    <label for="hide-childless-inlaws">Hide Childless Inlaws</label>
                </p>
            </div>

            <div class="section-header">
                <button id="reset-styling-btn" type="button">Use Defaults</button>
                <h2>Tree Styling</h2>
            </div>

            <div class="input-section">
                <p>
                    <span class="range-value" id="node-width-value"></span>
                    <input type="range" id="node-width" min="20" max="480" value="120">
                    <label for="node-width">Node Width</label>
                </p>
                <p>
                    <span class="range-value" id="node-height-value"></span>
                    <input type="range" id="node-height" min="20" max="320" value="80">
                    <label for="node-height">Node Height</label>
                </p>
                <p>
                    <span class="range-value" id="link-width-value"></span>
                    <input type="range" id="link-width-slider" min="1" max="28" value="6">
                    <label for="link-width-slider">Link Width</label>
                </p>
                <p>
                    <span class="range-value" id="hue-value"></span>
                    <input type="range" id="hue-slider" min="0" max="359" value="120">
                    <label for="hue-slider">Hue (Root)</label>
                </p>
                <p>
                    <span class="range-value" id="saturation-value"></span>
                    <input type="range" id="saturation-slider" min="0" max="100" value="33">
                    <label for="saturation-slider">Saturation</label>
                </p>
                <p>
                    <span class="range-value" id="brightness-value"></span>
                    <input type="range" id="brightness-slider" min="0" max="100" value="33">
                    <label for="brightness-slider">Brightness</label>
                </p>
                <p>
                    <span class="range-value" id="text-brightness-value"></span>
                    <input type="range" id="text-brightness-slider" min="0" max="100" value="90">
                    <label for="text-brightness-slider">Text Brightness</label>
                </p>
                <p>
                    <input type="checkbox" id="transparent-bg-rect" checked>
                    <label for="transparent-bg-rect">Transparent Background</label>
                </p>
                <p>
                    <input type="color" id="color-picker" value="#000000" disabled>
                    <label for="color-picker">Background Color</label>
                </p>
                <p>
                    <input type="checkbox" id="highlight-ancestors" checked>
                    <label for="highlight-ancestors">Highlight Root's Ancestors</label>
                </p>
                <p>
                    <input type="checkbox" id="show-names" checked>
                    <label for="show-names">Show Names</label>
                </p>
                <p>
                    <input type="checkbox" id="show-years" checked>
                    <label for="show-years">Show Years of Birth/Death</label>
                </p>
                <p>
                    <input type="checkbox" id="show-tooltips" checked>
                    <label for="show-tooltips">Show Tool Tips</label>
                </p>
            </div>
        </div>
        <div class="right-column">
            <div class="section-header">
                <button id="save-svg-btn">Save SVG</button>
                <button id="save-png-btn">Save PNG</button>
                <h2 id="family-tree-header">Family&nbsp;Tree&nbsp;&nbsp;&nbsp;<span id="root-name"></span>&nbsp;&nbsp;&nbsp;<span id="node-count"></span></h2>
            </div>

            <div id="family-tree-div">
                <p>Open a GEDCOM file to get started.</p>
                <p>It will be processed in your browser and will not be uploaded to the server.</p>
            </div>
        </div>
    </div>
    <script src="gedcom.js"></script>
    <script src="build_tree.js"></script>
    <script src="position_tree.js"></script>
    <script src="draw_tree.js"></script>
    <script src="ui.js"></script>
</body>
</html>
