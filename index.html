<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Family Tree Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>Complete Family Tree Viewer</h1>
    <div class="container">
        <div class="left-column">
            <h2>Inputs</h2>
            <h3>Gedcom File</h3>
            <input type="file" id="fileInput" accept=".ged,.gedcom">
            <h3>Root Person</h3>
            <select id="individualSelect" size="10">
                <option>Select an individual...</option>
            </select>
            <h3>Generations</h3>
            <input type="number" id="generationsInput" min="1" max="10" value="1">
        </div>
        <div class="right-column">
            <h2>Content</h2>
            <div id="fileContent"></div>
        </div>
    </div>
    <script src="gedcom.js"></script>
    <script src="d3.js"></script>
    <script src="ui.js"></script>
</body>
</html>
