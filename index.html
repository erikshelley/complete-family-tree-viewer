<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader" content="no-darken">
    <meta name="darkreader-lock">
    <title>Complete Family Tree Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>Complete Family Tree Viewer</h1>
    <div class="container">
        <div class="left-column">
            <h2>Inputs</h2>

            <h3>Gedcom File</h3>
            <input type="file" id="file-input" accept=".ged,.gedcom">

            <h3>Tree Options</h3>
            <label for="individual-select">Select Root</label>
            <input type="text" id="individual-filter" placeholder="Type to filter names..." style="width:100%;margin-bottom:6px;">
            <select id="individual-select" size="10">
                <option>Populated from Gedcom file...</option>
            </select>

            <p>
            <input type="number" id="generations-up" min="0" max="20" value="1">
            <label for="generations-up">Generations Up</label>
            </p>

            <p>
            <input type="number" id="generations-down" min="0" max="20" value="1">
            <label for="generations-down">Generations Down</label>
            </p>

            <p>
            <input type="range" id="hue-slider" min="0" max="359" value="0">
            <label for="hue-slider">Root Generation Hue</label>
            </p>

            <p>
            <input type="range" id="saturation-slider" min="0" max="100" value="33">
            <label for="saturation-slider">Node Saturation</label>
            </p>

            <p>
            <input type="range" id="brightness-slider" min="0" max="100" value="40">
            <label for="brightness-slider">Node Brightness</label>
            </p>

            <p>
            <input type="range" id="text-brightness-slider" min="0" max="100" value="90">
            <label for="text-brightness-slider">Text Brightness</label>
            </p>

            <p>
            <input type="checkbox" id="transparent-bg-rect" checked>
            <label for="transparent-bg-rect">Transparent Background</label>
            </p>

            <p>
            <input type="color" id="color-picker" value="#000000">
            <label for="color-picker">Background Color</label>
            </p>
        </div>
        <div class="right-column">
            <h2>Family Tree</h2>
            <div id="family-tree-div">
                <p>Open a GEDCOM file to get started.</p>
                <p>It will be processed in your browser and will not be uploaded to the server.</p>
            </div>
        </div>
    </div>
    <script src="gedcom.js"></script>
    <script src="build_tree.js"></script>
    <script src="position_tree.js"></script>
    <script src="draw_tree.js"></script>
    <script src="ui.js"></script>
</body>
</html>
